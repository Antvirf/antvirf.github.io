baseURL = "http://aviitala.com"
title = "ANTTI VIITALA"
theme = "hugo-coder"
languageCode = "en"
defaultContentLanguage = "en"
paginate = 20
pygmentsStyle = "bw"
pygmentsCodeFences = true
pygmentsCodeFencesGuessSyntax = true
enableEmoji = true
enableRobotsTXT = true
enableGitInfo = true

# Enable Utteranc.es comments
[params.utterances]
  repo = "Antvirf/antvirf.github.io"
  issueTerm = "url"
  label = "comment"
  theme = "preferred-color-scheme"

[params]
  author = "Antti Viitala"
  license = '<a rel="license" href="http://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA-4.0</a>'
  description = "Antti Viitala personal portfolio site"
  keywords = "blog,developer,personal"
  info = ["Software development", "Cloud architecture, infra & devops", "Professional googler"]
  avatarURL = "images/avatar.png"
  favicon_16 = "images/favicon-16x16.png"
  favicon_32 = "images/favicon-32x32.png"
  #gravatar = "john.doe@example.com"
  dateFormat = "2006-01-02"
  since = 2022
  manifest =  "site.webmanifest"
  images = ['images/apple-touch-icon-152x152.png','images/splash.png']

# Git Commit in Footer, uncomment the line below to enable it
commit = "https://github.com/Antvirf/antvirf.github.io/commit"

colorScheme = "auto" # auto / dark / light
hideColorSchemeToggle = false
maxSeeAlsoItems = 5

# Custom CSS
customCSS = ["custom_style.css"]
# Custom SCSS, file path is relative to Hugo's asset folder (default: {your project root}/assets)
customSCSS = []
# Custom JS
customJS = []

[permalinks]
posts = '/posts/:slugorfilename' #-:year:month:day'

# If you want to use goatcounter(https://goatcounter.com) for analytics, add this section
[params.goatCounter]
code = "aviitala"

# If you want to implement a Content-Security-Policy, add this section
[params.csp]
childsrc = ["'self'"]
fontsrc = ["'self'", "https://fonts.gstatic.com", "https://cdn.jsdelivr.net/"]
formaction = ["'self'"]
framesrc = [
  "'self'",
  "https://utteranc.es/"
  ]
imgsrc = [
  "'self'",
  "http://aviitala.goatcounter.com",
  "https://aviitala.com",
  "https://github.com",
  "https://raw.githubusercontent.com",
  "https://img.shields.io",
  "https://sonarcloud.io",
  "https://dl.circleci.com",
  "https://snyk.io",
  "https://badge.fury.io",
  "*.cloudfront.net"
  ]
objectsrc = ["'none'"]
stylesrc = [
  "'self'",
  "'unsafe-inline'",
  "https://fonts.googleapis.com/",
  "https://cdn.jsdelivr.net/"
]
scriptsrc = [
  "'self'",
  "'unsafe-inline'",
  "https://www.google-analytics.com",
  "https://cdn.jsdelivr.net/",
  "http://gc.zgo.at",
  "https://utteranc.es/"
]
prefetchsrc = ["'self'"]
# connect-src directive – defines valid targets for to XMLHttpRequest (AJAX), WebSockets or EventSource
connectsrc = ["'self'", "https://aviitala.goatcounter.com"]

[taxonomies]
category = "categories"
series = "series"
tag = "tags"
author = "authors"

[[params.social]]
name = "Github"
icon = "fa fa-2x fa-github"
weight = 1
url = "https://github.com/Antvirf/"
target = "_blank"

[[params.social]]
name = "LinkedIn"
icon = "fa fa-2x fa-linkedin"
weight = 4
url = "https://www.linkedin.com/in/anttiviitala/"
target = "_blank"

